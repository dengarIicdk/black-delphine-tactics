<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тактическая Доска - BLACK DELPHINE</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            margin: 0;
            background-color: #0b0c10;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 250px;
            background-color: rgba(17, 18, 23, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 20;
            flex-shrink: 0;
            overflow-y: auto;
        }

        h3 {
            margin: 3px 0;
            font-size: 16px;
            text-align: center;
            color: #ffffff;
            letter-spacing: 2px;
            font-weight: bold;
        }

        h4 {
            margin: 12px 0 4px 0;
            color: #888888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button {
            background-color: rgba(255, 255, 255, 0.04);
            color: #b3b3b3;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.2s ease;
            text-align: left;
        }

            button:hover {
                background-color: rgba(255, 255, 255, 0.09);
                color: #ffffff;
                border-color: rgba(255, 255, 255, 0.2);
            }

            button:disabled {
                opacity: 0.3;
                cursor: not-allowed;
                background-color: rgba(0, 0, 0, 0.2);
            }

            button.active {
                background-color: rgba(255, 255, 255, 0.15);
                border-color: rgba(255, 255, 255, 0.4);
                color: #ffffff;
            }

        .btn-map {
            background-color: rgba(255, 255, 255, 0.02);
        }

            .btn-map.active {
                background-color: rgba(255, 255, 255, 0.12);
                border-color: rgba(255, 255, 255, 0.3);
                color: #ffffff;
            }

        #color-picker {
            display: flex;
            gap: 8px;
            margin-top: 2px;
            flex-wrap: wrap;
        }

        .color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

            .color-dot.selected {
                border-color: #ffffff;
                transform: scale(1.15);
            }

            .color-dot.disabled {
                opacity: 0.2;
                cursor: not-allowed;
                transform: none !important;
            }

        .object-spawn-panel {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .spawn-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            padding: 5px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 12px;
            color: #aaaaaa;
        }

        .btn-spawn {
            padding: 3px 8px;
            font-size: 11px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #tactics-presets-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .btn-preset {
            font-size: 12px;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.08);
            color: #dddddd;
        }

            .btn-preset:hover {
                background: rgba(255, 255, 255, 0.08);
            }

            .btn-preset.active {
                background: rgba(255, 255, 255, 0.15);
                border-color: rgba(255, 255, 255, 0.4);
                color: #ffffff;
            }

        /* Зона карты */
        #map-container {
            flex-grow: 1;
            background-color: #0b0c10;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #zoom-wrapper {
            position: absolute;
            width: 618px;
            height: 447px;
            transform-origin: center center;
        }

        #map-bg {
            position: absolute;
            width: 618px;
            height: 447px;
            background-color: #000000;
            background-size: 100% 100%;
            background-position: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }

        #paint-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

            #paint-canvas.paintable {
                cursor: crosshair;
            }

        /* Курсор ластика для холста */
        .eraser-mode {
            cursor: cell !important;
        }
        /* Блок для трех кнопок гайдов вверху справа */
        #top-right-menu {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 30;
            display: flex;
            gap: 10px;
        }

        .btn-guide {
            background-color: rgba(17, 18, 23, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffcc00;
            font-size: 11px;
            padding: 8px 14px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }

            .btn-guide:hover {
                background-color: rgba(255, 255, 255, 0.1);
                color: #ffffff;
                border-color: rgba(255, 255, 255, 0.3);
            }

        /* Выдвижное правое меню для гайдов */
        #guide-sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 280px;
            height: 100vh;
            background-color: rgba(17, 18, 23, 0.95);
            backdrop-filter: blur(15px);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.7);
            z-index: 100;
            transition: right 0.3s ease;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

            #guide-sidebar.open {
                right: 0;
            }

        .guide-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 10px;
        }

            .guide-header h4 {
                margin: 0;
                color: #ffcc00;
                font-size: 14px;
                letter-spacing: 1px;
            }

        .btn-close-guide {
            background: transparent;
            border: none;
            color: #888888;
            font-size: 22px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

            .btn-close-guide:hover {
                color: #ff4d4d;
            }

        .guide-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .guide-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

            .guide-item h5 {
                margin: 0;
                font-size: 12px;
                color: #ffffff;
                font-weight: bold;
                text-transform: uppercase;
            }

        .guide-img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
            background-color: #000000;
            display: block;
            cursor: zoom-in;
        }

        /* Модальное окно для полноэкранного увеличения картинок */
        #img-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

            #img-modal img {
                max-width: 92%;
                max-height: 92%;
                border-radius: 8px;
                box-shadow: 0 0 25px rgba(0,0,0,0.9);
                border: 1px solid rgba(255,255,255,0.15);
            }

        /* Тактический маркер-контейнер */
        .token {
            position: absolute;
            width: 8px;
            height: 8px;
            z-index: 50;
            box-sizing: border-box;
            cursor: move;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

            .token::before {
                content: '';
                position: absolute;
                top: -10px;
                left: -10px;
                right: -10px;
                bottom: -10px;
                z-index: 1;
            }

        .token-dot-visual {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-sizing: border-box;
            z-index: 2;
        }

        .token span {
            position: absolute;
            top: 11px;
            font-size: 6px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 1px 1px 2px #000000, -1px -1px 2px #000000, 1px -1px 2px #000000, -1px 1px 2px #000000;
            white-space: nowrap;
            pointer-events: none;
            z-index: 2;
            letter-spacing: 0.1px;
        }

        .shytrma .token-dot-visual {
            background: #ff3333;
            border: 1px solid #ffffff;
            box-shadow: 0 0 6px #ff3333;
        }

        .gazeli .token-dot-visual {
            background: #3399ff;
            border: 1px solid #ffffff;
            box-shadow: 0 0 6px #3399ff;
        }

        .polyraki .token-dot-visual {
            background: #2ecc71;
            border: 1px solid #ffffff;
            box-shadow: 0 0 6px #2ecc71;
        }

        .ralik-t .token-dot-visual {
            background: #f39c12;
            border: 1px solid #ffffff;
            box-shadow: 0 0 6px #f39c12;
        }

        .podderzhka .token-dot-visual {
            background: #00bfff;
            border: 1px solid #ffffff;
            box-shadow: 0 0 6px #00bfff;
        }

        .zamena .token-dot-visual {
            background: #9b59b6;
            border: 1px solid #ffffff;
            box-shadow: 0 0 6px #9b59b6;
        }

        .obj-barricade .token-dot-visual {
            background: #e74c3c;
            border: 1px solid #000000;
            border-radius: 0%;
        }

        .obj-tent .token-dot-visual {
            background: #9b59b6;
            border: 1px solid #000000;
            border-radius: 0%;
        }

        .obj-ralik .token-dot-visual {
            background: #f1c40f;
            border: 1px solid #000000;
            border-radius: 0%;
        }

        .token[class*="obj-"] span {
            color: #cccccc;
            font-size: 5.5px;
        }
    </style>
</head>
<body>

    <!-- Кнопки гайдов в верхнем правом углу -->
    <div id="top-right-menu">
        <button class="btn-guide" onclick="openGuide('barricade')">🛑 Гайд по баррикадам</button>
        <button class="btn-guide" onclick="openGuide('tent')">⛺ Гайд по палаткам</button>
        <button class="btn-guide" onclick="openGuide('ralik')">📻 Гайд по раликам</button>
    </div>

    <!-- Единая выезжающая панель справа -->
    <div id="guide-sidebar">
        <div class="guide-header">
            <h4 id="guide-sidebar-title">Гайд по баррикадам</h4>
            <button class="btn-close-guide" onclick="closeGuide()">×</button>
        </div>
        <div class="guide-content" id="guide-images-container">
            <!-- Сюда подгружаются скриншоты -->
        </div>
    </div>

    <!-- Модальное окно для полноэкранного увеличения картинок -->
    <div id="img-modal" onclick="closeImageModal()">
        <img id="modal-target-img" src="" alt="Увеличенное изображение">
    </div>

    <div id="sidebar">
        <h3>BLACK DELPHINE</h3>
        <hr style="border-color: rgba(255,255,255,0.08); width: 100%; margin: 2px 0;">

        <h4>Режимы управления</h4>
        <button id="btn-move" class="active">✋ Режим: Двигать Фишки</button>
        <button id="btn-pan">🗺️ Режим: Тащить Карту</button>
        <button id="btn-draw">✏️ Режим: Рисовать</button>
        <button id="btn-erase">🧽 Режим: Ластик</button>

        <h4>Цвет кисти</h4>
        <div id="color-picker">
            <div class="color-dot selected" style="background: #00d2ff;" data-color="#00d2ff"></div>
            <div class="color-dot" style="background: #ff4d4d;" data-color="#ff4d4d"></div>
            <div class="color-dot" style="background: #3399ff;" data-color="#3399ff"></div>
            <div class="color-dot" style="background: #2ecc71;" data-color="#2ecc71"></div>
            <div class="color-dot" style="background: #f39c12;" data-color="#f39c12"></div>
            <div class="color-dot" style="background: #9b59b6;" data-color="#9b59b6"></div>
        </div>

        <h4>Малые объекты</h4>
        <div class="object-spawn-panel">
            <div class="spawn-row">🛑 Баррикада <button class="btn-spawn" id="spawn-barricade" onclick="spawnObject('barricade')">+ Создать</button></div>
            <div class="spawn-row">⛺ Палатка <button class="btn-spawn" id="spawn-tent" onclick="spawnObject('tent')">+ Создать</button></div>
            <div class="spawn-row">📻 Ралик <button class="btn-spawn" id="spawn-ralik" onclick="spawnObject('ralik')">+ Создать</button></div>
        </div>

        <h4>Сцены тактик</h4>
        <div id="tactics-presets-list">
            <button class="btn-preset" data-preset-img="nizina_default.png" data-map-type="nizina" onclick="selectPresetTactics(this)">📋 Низина (дефолт)</button>
            <button class="btn-preset" data-preset-img="hvoynik_default.png" data-map-type="hvoynik" onclick="selectPresetTactics(this)">📋 Хвойник (дефолт)</button>
            <button class="btn-preset" data-preset-img="berda_center_default.png" data-map-type="berda_center" onclick="selectPresetTactics(this)">📋 Берда (центр) дефолт</button>
            <button class="btn-preset" data-preset-img="berda_side_default.png" data-map-type="berda_side" onclick="selectPresetTactics(this)">📋 Берда (сбоку) дефолт</button>
        </div>

        <h4>Выбор карты</h4>
        <button class="btn-map active" data-img="nizina.png" data-map-type="nizina">🗺️ 1) Низина</button>
        <button class="btn-map" data-img="hvoynik.png" data-map-type="hvoynik">🗺️ 2) Хвойник</button>
        <button class="btn-map" data-img="berda_center.png" data-map-type="berda_center">🗺️ 3) Берда (центр)</button>
        <button class="btn-map" data-img="berda_side.png" data-map-type="berda_side">🗺️ 4) Берда (сбоку)</button>

        <button id="btn-reset" style="margin-top: auto; background-color: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.08); text-align: center;">🔄 Сбросить позиции</button>
        <button id="btn-clear" style="background-color: rgba(200, 50, 50, 0.15); border-color: rgba(200, 50, 50, 0.3); text-align: center;">🗑️ Очистить стрелки</button>
    </div>

    <div id="map-container">
        <div id="zoom-wrapper">
            <div id="map-bg">
                <canvas id="paint-canvas" width="618" height="447"></canvas>
            </div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('paint-canvas');
        const ctx = canvas.getContext('2d');
        const mapBg = document.getElementById('map-bg');
        const mapContainer = document.getElementById('map-container');
        const zoomWrapper = document.getElementById('zoom-wrapper');
        const btnMove = document.getElementById('btn-move');
        const btnPan = document.getElementById('btn-pan');
        const btnDraw = document.getElementById('btn-draw');
        const btnErase = document.getElementById('btn-erase');
        const btnClear = document.getElementById('btn-clear');
        const btnReset = document.getElementById('btn-reset');
        const mapButtons = document.querySelectorAll('.btn-map');
        const colorDots = document.querySelectorAll('.color-dot');
        const presetButtons = document.querySelectorAll('.btn-preset');
        const guideSidebar = document.getElementById('guide-sidebar');
        const guideTitle = document.getElementById('guide-sidebar-title');
        const guideContainer = document.getElementById('guide-images-container');
        const imgModal = document.getElementById('img-modal');
        const modalTargetImg = document.getElementById('modal-target-img');

        let currentMode = 'move';
        let isDrawing = false;
        let currentDrawColor = '#00d2ff';
        let currentMap = 'nizina.png';
        let currentMapType = 'nizina';
        let currentGuideType = 'barricade';
        let isPresetMode = false; // Переменная для отслеживания режима пресетов

        let scale = 1; let panX = 0; let panY = 0;
        let isPanning = false; let startPanX = 0; let startPanY = 0;

        const defaultTeams = [
            { type: 'team', cls: 'shytrma', label: 'ШТУРМА', x: 20, y: 410 },
            { type: 'team', cls: 'gazeli', label: 'ГАЗЕЛИ', x: 70, y: 410 },
            { type: 'team', cls: 'polyraki', label: 'ПОЛУРАКИ', x: 120, y: 410 },
            { type: 'team', cls: 'ralik-t', label: 'РАЛИК', x: 170, y: 410 },
            { type: 'team', cls: 'podderzhka', label: 'ПОДДЕРЖКА', x: 220, y: 410 },
            { type: 'team', cls: 'zamena', label: 'ЗАМЕНА', x: 270, y: 410 }
        ];

        let sceneStates = {};

        mapBg.style.backgroundImage = `url('${currentMap}')`;

        function saveCurrentSceneState() {
            // Если мы смотрим готовую тактику, сохранять изменения на неё нельзя
            if (isPresetMode) return;

            const currentImg = mapBg.style.backgroundImage.replace(/^url\(['"](.+)['"]\)$/, '$1');
            if (!currentImg) return;

            const tokens = [];
            document.querySelectorAll('.token').forEach(el => {
                tokens.push({
                    type: el.dataset.type,
                    cls: el.dataset.cls,
                    label: el.dataset.label,
                    x: parseInt(el.style.left) || 0,
                    y: parseInt(el.style.top) || 0
                });
            });

            sceneStates[currentImg] = {
                canvasData: canvas.toDataURL(),
                tokens: tokens
            };
        }

        function loadSceneState(targetImg) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.querySelectorAll('.token').forEach(el => el.remove());

            // Если активирован режим готовой тактики, полностью очищаем всё и выходим
            if (isPresetMode) {
                setMode('pan'); // Принудительно ставим режим перетаскивания карты
                return;
            }

            const state = sceneStates[targetImg];
            if (state) {
                if (state.canvasData) {
                    const img = new Image();
                    img.src = state.canvasData;
                    img.onload = () => { ctx.drawImage(img, 0, 0); };
                }
                state.tokens.forEach(t => { createTokenDOM(t); });
            } else {
                defaultTeams.forEach(t => { createTokenDOM(t); });
            }
        }
        window.selectPresetTactics = function (element) {
            saveCurrentSceneState();

            presetButtons.forEach(btn => btn.classList.remove('active'));
            mapButtons.forEach(b => b.classList.remove('active'));

            element.classList.add('active');
            const presetImg = element.getAttribute('data-preset-img');
            currentMapType = element.getAttribute('data-map-type');

            isPresetMode = true; // Включаем режим готовой тактики

            // Блокируем кнопки спавна и палитру, чтобы нельзя было редактировать пресет
            document.getElementById('spawn-barricade').disabled = true;
            document.getElementById('spawn-tent').disabled = true;
            document.getElementById('spawn-ralik').disabled = true;
            document.getElementById('btn-draw').disabled = true;
            document.getElementById('btn-erase').disabled = true;
            document.getElementById('btn-move').disabled = true;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.add('disabled'));

            if (presetImg) {
                mapBg.style.backgroundImage = `url('${presetImg}')`;
                loadSceneState(presetImg);
                if (guideSidebar.classList.contains('open')) {
                    updateGuideContent();
                }
            }
        };

        mapButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                saveCurrentSceneState();

                presetButtons.forEach(p => p.classList.remove('active'));
                mapButtons.forEach(b => b.classList.toggle('active', b === btn));

                currentMap = btn.getAttribute('data-img');
                currentMapType = btn.getAttribute('data-map-type');

                isPresetMode = false; // Отключаем режим готовой тактики

                // Разблокируем интерфейс для полноценного редактирования карты
                document.getElementById('spawn-barricade').disabled = false;
                document.getElementById('spawn-tent').disabled = false;
                document.getElementById('spawn-ralik').disabled = false;
                document.getElementById('btn-draw').disabled = false;
                document.getElementById('btn-erase').disabled = false;
                document.getElementById('btn-move').disabled = false;
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('disabled'));
                setMode('move'); // Возвращаем режим двигания фишек по умолчанию

                mapBg.style.backgroundImage = `url('${currentMap}')`;
                loadSceneState(currentMap);

                if (guideSidebar.classList.contains('open')) {
                    updateGuideContent();
                }
            });
        });

        function updateGuideContent() {
            guideContainer.innerHTML = '';

            if (currentGuideType === 'barricade') guideTitle.innerText = 'Гайд по баррикадам';
            if (currentGuideType === 'tent') guideTitle.innerText = 'Гайд по палаткам';
            if (currentGuideType === 'ralik') guideTitle.innerText = 'Гайд по раликам';

            const guidesData = {
                'barricade': {
                    'nizina': [
                        { title: 'Баррикады: Точка A (Низина)', src: 'nizina_barr_a.png' },
                        { title: 'Баррикады: Точка B (Низина)', src: 'nizina_barr_b.png' },
                        { title: 'Баррикады: Точка C (Низина)', src: 'nizina_barr_c.png' }
                    ],
                    'hvoynik': [
                        { title: 'Баррикады: Точка A (Хвойник)', src: 'hvoynik_barr_a.png' },
                        { title: 'Баррикады: Точка B (Хвойник)', src: 'hvoynik_barr_b.png' }
                    ],
                    'berda_center': [
                        { title: 'Баррикады: Центр A', src: 'berda_c_barr_a.png' },
                        { title: 'Баррикады: Центр B', src: 'berda_c_barr_b.png' }
                    ],
                    'berda_side': [
                        { title: 'Баррикады: Сбоку A', src: 'berda_s_barr_a.png' },
                        { title: 'Баррикады: Сбоку B', src: 'berda_s_barr_b.png' }
                    ]
                },
                'tent': {
                    'nizina': [
                        { title: 'Палатки: Точка A (Низина)', src: 'nizina_tent_a.png' },
                        { title: 'Палатки: Точка B (Низина)', src: 'nizina_tent_b.png' }
                    ],
                    'hvoynik': [
                        { title: 'Палатки: Точка A (Хвойник)', src: 'hvoynik_tent_a.png' }
                    ],
                    'berda_center': [
                        { title: 'Палатки: Центр A', src: 'berda_c_tent_a.png' }
                    ],
                    'berda_side': [
                        { title: 'Палатки: Сбоку A', src: 'berda_s_tent_a.png' }
                    ]
                },
                'ralik': {
                    'nizina': [
                        { title: 'Ралики: Точка A (Низина)', src: 'nizina_ralik_a.png' }
                    ],
                    'hvoynik': [
                        { title: 'Ралики: Точка A (Хвойник)', src: 'hvoynik_ralik_a.png' }
                    ],
                    'berda_center': [
                        { title: 'Ралики: Центр A', src: 'berda_c_ralik_a.png' }
                    ],
                    'berda_side': [
                        { title: 'Ралики: Сбоку A', src: 'berda_s_ralik_a.png' }
                    ]
                }
            };

            const activeGuideCategory = guidesData[currentGuideType] || {};
            const activePoints = activeGuideCategory[currentMapType] || [];

            if (activePoints.length === 0) {
                guideContainer.innerHTML = '<div style="font-size:12px;color:#888;text-align:center;margin-top:20px;">Гайдов для этой карты пока нет</div>';
                return;
            }

            activePoints.forEach(pt => {
                const item = document.createElement('div');
                item.className = 'guide-item';
                item.innerHTML = `<h5>${pt.title}</h5><img src="${pt.src}" class="guide-img" alt="${pt.title}" onclick="openImageModal('${pt.src}')">`;
                guideContainer.appendChild(item);
            });
        }

        window.openGuide = function (type) {
            currentGuideType = type;
            updateGuideContent();
            guideSidebar.classList.add('open');
        };

        window.closeGuide = function () {
            guideSidebar.classList.remove('open');
        };

        window.openImageModal = function (src) {
            modalTargetImg.src = src;
            imgModal.style.display = 'flex';
        };

        window.closeImageModal = function () {
            imgModal.style.display = 'none';
            modalTargetImg.src = '';
        };
        colorDots.forEach(dot => {
            dot.addEventListener('click', () => {
                if (isPresetMode) return; // Блокируем смену цвета в режиме пресета
                colorDots.forEach(d => d.classList.remove('selected'));
                dot.classList.add('selected');
                currentDrawColor = dot.getAttribute('data-color');
            });
        });

        function setMode(mode) {
            // Если включен готовый пресет тактики — принудительно оставляем только режим перемещения карты
            if (isPresetMode) {
                currentMode = 'pan';
                btnMove.classList.remove('active');
                btnPan.classList.add('active');
                btnDraw.classList.remove('active');
                btnErase.classList.remove('active');
                canvas.style.pointerEvents = 'none';
                canvas.classList.remove('eraser-mode');
                return;
            }

            currentMode = mode;
            btnMove.classList.toggle('active', mode === 'move');
            btnPan.classList.toggle('active', mode === 'pan');
            btnDraw.classList.toggle('active', mode === 'draw');
            btnErase.classList.toggle('active', mode === 'erase');

            canvas.style.pointerEvents =
                (mode === 'draw' || mode === 'erase') ? 'auto' : 'none';

            document.querySelectorAll('.token').forEach(token => {
                if (mode === 'draw' || mode === 'erase') {
                    token.style.pointerEvents = 'none';
                } else {
                    token.style.pointerEvents = 'auto';
                }
            });

            if (mode === 'erase') {
                canvas.classList.add('eraser-mode');
            } else {
                canvas.classList.remove('eraser-mode');
            }
        }

        btnMove.addEventListener('click', () => setMode('move'));
        btnPan.addEventListener('click', () => setMode('pan'));
        btnDraw.addEventListener('click', () => setMode('draw'));
        btnErase.addEventListener('click', () => setMode('erase'));

        btnClear.addEventListener('click', () => {
            if (isPresetMode) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            saveCurrentSceneState();
        });

        btnReset.addEventListener('click', () => {
            if (isPresetMode) return;
            document.querySelectorAll('.token[data-type="team"]')
                .forEach(token => {
                    const def = defaultTeams
                        .find(d => d.label === token.dataset.label);
                    if (def) {
                        token.style.left = def.x + 'px';
                        token.style.top = def.y + 'px';
                    }
                });
            document.querySelectorAll('.token[data-type="obj"]')
                .forEach(el => el.remove());
            scale = 1; panX = 0; panY = 0;
            updateTransform();
            saveCurrentSceneState();
        });

        function updateTransform() {
            zoomWrapper.style.transform =
                `translate(${panX}px, ${panY}px) scale(${scale})`;
        }

        mapContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) scale = Math.min(scale + 0.1, 5);
            else scale = Math.max(scale - 0.1, 0.5);
            updateTransform();
        });

        mapContainer.addEventListener('mousedown', (e) => {
            // Разрешаем перетаскивать карту в режиме пресетов в любом случае
            if (currentMode !== 'pan' && !isPresetMode) return;
            isPanning = true;
            startPanX = e.clientX - panX;
            startPanY = e.clientY - panY;
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (isPanning && (currentMode === 'pan' || isPresetMode)) {
                panX = e.clientX - startPanX;
                panY = e.clientY - startPanY;
                updateTransform();
            }
        });

        document.addEventListener('mouseup', () => {
            if (isPanning) isPanning = false;
        });

        canvas.addEventListener('mousedown', (e) => {
            if (isPresetMode) return; // Полный запрет на рисование
            if (currentMode !== 'draw' && currentMode !== 'erase') return;
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);

            if (currentMode === 'erase') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 20 / scale;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentDrawColor;
                ctx.lineWidth = 4 / scale;
            }
            ctx.lineCap = 'round';
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isPresetMode) return;
            if (isDrawing &&
                (currentMode === 'draw' || currentMode === 'erase')) {
                ctx.lineTo(e.offsetX, e.offsetY);
                ctx.stroke();
            }
        });

        window.addEventListener('mouseup', () => {
            if (isDrawing) {
                isDrawing = false;
                ctx.globalCompositeOperation = 'source-over';
                saveCurrentSceneState();
            }
        });

        let activeToken = null;
        let startX = 0, startY = 0;
        let tokenLeft = 0, tokenTop = 0;

        function initDragForToken(token) {
            token.addEventListener('mousedown', (e) => {
                if (isPresetMode) return; // Запрет на движение фишек в пресетах
                if (currentMode !== 'move' || e.button !== 0) return;
                activeToken = token;
                startX = e.clientX;
                startY = e.clientY;
                tokenLeft = parseInt(token.style.left) || 0;
                tokenTop = parseInt(token.style.top) || 0;
                token.style.zIndex = 1000;
                e.stopPropagation();
            });
        }

        document.addEventListener('mousemove', (e) => {
            if (!activeToken || isPresetMode) return;
            const dx = (e.clientX - startX) / scale;
            const dy = (e.clientY - startY) / scale;
            let newX = tokenLeft + dx;
            let newY = tokenTop + dy;
            newX = Math.max(0, Math.min(newX, 618 - activeToken.offsetWidth));
            newY = Math.max(0, Math.min(newY, 447 - activeToken.offsetHeight));
            activeToken.style.left = newX + 'px';
            activeToken.style.top = newY + 'px';
        });

        document.addEventListener('mouseup', () => {
            if (activeToken) {
                activeToken.style.zIndex = '50';
                activeToken = null;
                saveCurrentSceneState();
            }
        });

        function createTokenDOM(t) {
            const div = document.createElement('div');
            div.dataset.type = t.type;
            div.dataset.cls = t.cls;
            div.dataset.label = t.label;
            div.className = `token ${t.cls}`;
            div.innerHTML =
                `<div class="token-dot-visual"></div><span>${t.label}</span>`;

            if (currentMode === 'draw' || currentMode === 'erase') {
                div.style.pointerEvents = 'none';
            }

            div.oncontextmenu = (e) => {
                if (t.type === 'team' || isPresetMode) return;
                e.preventDefault();
                div.remove();
                saveCurrentSceneState();
            };
            div.style.left = t.x + 'px';
            div.style.top = t.y + 'px';
            mapBg.appendChild(div);
            initDragForToken(div);
        }

        window.spawnObject = function (type) {
            if (isPresetMode) return; // Запрет на создание объектов в пресетах
            let config = {};
            if (type === 'barricade') {
                config = {
                    type: 'obj',
                    cls: 'obj-barricade',
                    label: 'БАРРИКАДА',
                    x: 297, y: 211
                };
            }
            if (type === 'tent') {
                config = {
                    type: 'obj',
                    cls: 'obj-tent',
                    label: 'ПАЛАТКА',
                    x: 297, y: 211
                };
            }
            if (type === 'ralik') {
                config = {
                    type: 'obj',
                    cls: 'obj-ralik',
                    label: 'РАЛИК',
                    x: 297, y: 211
                };
            }
            createTokenDOM(config);
            saveCurrentSceneState();
        };

        loadSceneState(currentMap);
    </script>
</body>
</html>
