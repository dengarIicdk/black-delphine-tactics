<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тактическая Карта - BLACK DELPHINE</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            margin: 0;
            background-color: #0b0d13;
            color: #e0e6ed;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* СТИЛЬНЫЕ ТЕМНЫЕ ПАНЕЛИ STALCRAFT */
        .panel {
            background-color: #11141d;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 20;
            flex-shrink: 0;
            overflow-y: auto;
            padding: 15px;
            box-sizing: border-box;
        }

        #left-sidebar {
            width: 220px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        #right-sidebar {
            width: 280px;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        h3 {
            margin: 0;
            font-size: 14px;
            text-align: center;
            color: #ffffff;
            letter-spacing: 1.5px;
            font-weight: bold;
            text-transform: uppercase;
        }

        h4 {
            margin: 10px 0 2px 0;
            color: #656e85;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button {
            background-color: #171b26;
            color: #a3aab8;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.2s ease;
            text-align: left;
            font-size: 12px;
            width: 100%;
            box-sizing: border-box;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

            button:hover {
                background-color: #202636;
                color: #ffffff;
                border-color: rgba(255, 255, 255, 0.15);
            }

            button.active {
                background-color: #272f42;
                border-color: #3b82f6;
                color: #ffffff;
                box-shadow: 0 0 8px rgba(59, 130, 246, 0.3);
            }

        .btn-map {
            background-color: #131620;
        }

        .modes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            width: 100%;
            box-sizing: border-box;
        }

        #color-picker {
            display: flex;
            gap: 6px;
            margin-top: 2px;
            flex-wrap: wrap;
            width: 100%;
        }

        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
            box-sizing: border-box;
        }

            .color-dot.selected {
                border-color: #ffffff;
                transform: scale(1.15);
            }

        /* ИСПРАВЛЕНО: Компактная кнопка базы гайдов в правом углу */
        #top-bar {
            position: absolute;
            top: 15px;
            right: 295px;
            z-index: 30;
            display: flex;
            align-items: center;
            background-color: transparent;
            box-sizing: border-box;
        }

        .btn-guide-link {
            background-color: rgba(17, 20, 29, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #ffb703;
            color: #ffb703;
            font-size: 11px;
            padding: 9px 16px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-decoration: none;
            display: flex;
            align-items: center;
        }

            .btn-guide-link:hover {
                background-color: #ffb703;
                color: #11141d;
            }
        /* СОСТАВ БОЙЦОВ */
        .squad-players-inputs {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            background: #0f1118;
            padding: 6px;
            border-radius: 6px;
            margin-top: 4px;
            border: 1px solid rgba(255,255,255,0.02);
            box-sizing: border-box;
        }

            .squad-players-inputs.open {
                display: grid;
            }

        .player-input-row {
            display: flex;
            gap: 3px;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

            .player-input-row input {
                width: 100%;
                background: #171b26;
                border: 1px solid rgba(255,255,255,0.05);
                border-radius: 4px;
                color: #fff;
                font-size: 10px;
                padding: 4px;
                outline: none;
                box-sizing: border-box;
            }

            .player-input-row button {
                width: auto;
                padding: 4px 6px;
                font-size: 10px;
                background: #272f42;
            }

        .squad-list-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 5px;
            width: 100%;
        }

        .squad-card-block {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .squad-card-item {
            background-color: #161a24;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            box-sizing: border-box;
            width: 100%;
        }

            .squad-card-item:hover {
                background-color: #1e2433;
                border-color: rgba(255, 255, 255, 0.12);
            }

        .squad-card-badge {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .squad-card-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .squad-card-title {
            font-size: 12px;
            font-weight: bold;
            color: #ffffff;
        }

        .squad-card-sub {
            font-size: 10px;
            color: #656e85;
            margin-top: 2px;
        }

        #map-container {
            flex-grow: 1;
            background-color: #07080c;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #zoom-wrapper {
            position: absolute;
            width: 618px;
            height: 447px;
            transform-origin: center center;
        }

        #map-bg {
            position: absolute;
            width: 618px;
            height: 447px;
            background-color: #000000;
            background-size: 100% 100%;
            background-position: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* ИСПРАВЛЕНО: Два раздельных холста на разных слоях Z-Index */
        #paint-canvas, #geom-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #geom-canvas {
            z-index: 5;
        }

        #paint-canvas {
            z-index: 4;
        }

        .canvas-active {
            pointer-events: auto !important;
        }

            .canvas-active.paintable {
                cursor: crosshair;
            }

        /* ФИШКИ 8PX */
        .token {
            position: absolute;
            width: 6px;
            height: 6px;
            z-index: 50;
            box-sizing: border-box;
            cursor: move;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

            .token::before {
                content: '';
                position: absolute;
                top: -10px;
                left: -10px;
                right: -10px;
                bottom: -10px;
                z-index: 1;
            }

        .token-dot-visual {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            box-sizing: border-box;
            z-index: 2;
        }

        .token span {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 4px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 1px 1px 1px #000, -1px -1px 1px #000, 1px -1px 1px #000, -1px 1px 1px #000;
            white-space: nowrap;
            pointer-events: none;
            z-index: 3;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .token.obj-token {
            width: 7px;
            height: 7px;
        }

            .token.obj-token .token-dot-visual {
                width: 7px;
                height: 7px;
                border-radius: 2px;
            }

            .token.obj-token span {
                display: none !important;
            }

        .shytrma .token-dot-visual {
            background: #ef4444;
            border: 1.5px solid #fff;
            box-shadow: 0 0 8px #ef4444;
        }

        .gazeli .token-dot-visual {
            background: #3b82f6;
            border: 1.5px solid #fff;
            box-shadow: 0 0 8px #3b82f6;
        }

        .polyraki .token-dot-visual {
            background: #10b981;
            border: 1.5px solid #fff;
            box-shadow: 0 0 8px #10b981;
        }

        .ralik-t .token-dot-visual {
            background: #f59e0b;
            border: 1.5px solid #fff;
            box-shadow: 0 0 8px #f59e0b;
        }

        .podderzhka .token-dot-visual {
            background: #06b6d4;
            border: 1.5px solid #fff;
            box-shadow: 0 0 8px #06b6d4;
        }

        .zamena .token-dot-visual {
            background: #9b59b6;
            border: 1.5px solid #fff;
            box-shadow: 0 0 8px #9b59b6;
        }

        .obj-barricade .token-dot-visual {
            background: #dc2626;
            border: 1px solid #000;
            box-shadow: 0 0 4px rgba(220, 38, 220, 0.5);
        }

        .obj-tent .token-dot-visual {
            background: #8b5cf6;
            border: 1px solid #000;
            box-shadow: 0 0 4px rgba(139, 92, 246, 0.5);
        }

        .obj-ralik .token-dot-visual {
            background: #eab308;
            border: 1px solid #000;
            box-shadow: 0 0 4px rgba(234, 179, 8, 0.5);
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <a href="base-guide.html" target="_blank" class="btn-guide-link">📖 Открыть базу гайдов →</a>
    </div>

    <!-- ЛЕВАЯ ПАНЕЛЬ С СЕТКОЙ ИНСТРУМЕНТОВ 2Х3 -->
    <div id="left-sidebar" class="panel">
        <h3>BLACK DELPHINE</h3>
        <hr style="border-color: rgba(255,255,255,0.05); width: 100%; margin: 0;">

        <h4>Режимы управления (1-5)</h4>
        <div class="modes-grid">
            <button id="btn-move" class="active">✋ Фишки</button>
            <button id="btn-pan">🗺️ Тянуть</button>
            <button id="btn-zone">🔷 Зона</button>
            <button id="btn-erase">🧽 Ластик</button>
            <button id="btn-draw" style="grid-column: span 2; text-align: center;">✏️ Кисть</button>
        </div>

        <h4>Цвет разметки</h4>
        <div id="color-picker">
            <div class="color-dot selected" style="background: #00d2ff;" data-color="#00d2ff"></div>
            <div class="color-dot" style="background: #ef4444;" data-color="#ef4444"></div>
            <div class="color-dot" style="background: #3b82f6;" data-color="#3b82f6"></div>
            <div class="color-dot" style="background: #10b981;" data-color="#10b981"></div>
            <div class="color-dot" style="background: #f59e0b;" data-color="#f59e0b"></div>
            <div class="color-dot" style="background: #9b59b6;" data-color="#9b59b6"></div>
        </div>

        <h4>Иконки объектов</h4>
        <button id="spawn-barricade" onclick="spawnObject('barricade')"><span style="color: #dc2626; margin-right: 5px;">■</span> Баррикада</button>
        <button id="spawn-tent" onclick="spawnObject('tent')"><span style="color: #8b5cf6; margin-right: 5px;">■</span> Палатка</button>
        <button id="spawn-ralik" onclick="spawnObject('ralik')"><span style="color: #eab308; margin-right: 5px;">■</span> Ралик</button>

        <h4>Сцены тактик</h4>
        <div id="tactics-presets-list" style="display: flex; flex-direction: column; gap: 4px;">
            <button class="btn-preset" data-preset-img="nizina_default.png" data-map-type="nizina" onclick="selectPresetTactics(this)">📋 Низина (дефолт)</button>
            <button class="btn-preset" data-preset-img="hvoynik_default.png" data-map-type="hvoynik" onclick="selectPresetTactics(this)">📋 Хвойник (дефолт)</button>
            <button class="btn-preset" data-preset-img="berda_center_default.png" data-map-type="berda_center" onclick="selectPresetTactics(this)">📋 Берда (центр)</button>
            <button class="btn-preset" data-preset-img="berda_side_default.png" data-map-type="berda_side" onclick="selectPresetTactics(this)">📋 Берда (сбоку)</button>
        </div>

        <button id="btn-reset" style="margin-top: auto; background-color: rgba(255,255,255,0.02); text-align: center;">🔄 Сбросить фишки</button>
        <button id="btn-clear" style="background-color: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); text-align: center; color: #fca5a5;">🗑️ Очистить разметку</button>
    </div>

    <!-- ЦЕНТРАЛЬНЫЙ ХОЛСТ С ДВУМЯ СЛОЯМИ CANVAS -->
    <div id="map-container">
        <div id="zoom-wrapper">
            <div id="map-bg">
                <!-- Рисунки кисти -->
                <canvas id="paint-canvas" width="618" height="447"></canvas>
                <!-- Неоновые базы и каркас забора КВ -->
                <canvas id="geom-canvas" width="618" height="447"></canvas>
            </div>
        </div>
    </div>
    <!-- ПРАВАЯ ПАНЕЛЬ: ВЫБОР ЧИСТЫХ КАРТ И МЕНЮ ОТРЯДОВ -->
    <div id="right-sidebar" class="panel">
        <h3>Управление боем</h3>
        <hr style="border-color: rgba(255, 255, 255, 0.05); width: 100%; margin: 0;">

        <h4>Выбор карты (Редактор)</h4>
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <button class="btn-map active" data-img="nizina.png" data-map-type="nizina">🗺️ 1) Низина</button>
            <button class="btn-map" data-img="hvoynik.png" data-map-type="hvoynik">🗺️ 2) Хвойник</button>
            <button class="btn-map" data-img="berda_center.png" data-map-type="berda_center">🗺️ 3) Берда (центр)</button>
            <button class="btn-map" data-img="berda_side.png" data-map-type="berda_side">🗺️ 4) Берда (сбоку)</button>
        </div>

        <h4>Отряды и бойцы</h4>
        <div class="squad-list-container" id="squads-sidebar-container"></div>
    </div>

    <script>
        const canvas = document.getElementById('paint-canvas'); const ctx = canvas.getContext('2d');
        // НАСТРОЕНО: Контекст второго изолированного холста для неоновых баз КВ
        const gCanvas = document.getElementById('geom-canvas'); const gCtx = gCanvas.getContext('2d');

        const mapBg = document.getElementById('map-bg'); const mapContainer = document.getElementById('map-container');
        const zoomWrapper = document.getElementById('zoom-wrapper'); const btnMove = document.getElementById('btn-move');
        const btnPan = document.getElementById('btn-pan'); const btnZone = document.getElementById('btn-zone');
        const btnErase = document.getElementById('btn-erase'); const btnDraw = document.getElementById('btn-draw');
        const btnClear = document.getElementById('btn-clear'); const btnReset = document.getElementById('btn-reset');
        const mapButtons = document.querySelectorAll('.btn-map'); const colorDots = document.querySelectorAll('.color-dot');
        const presetButtons = document.querySelectorAll('.btn-preset');

        let currentMode = 'move'; let isDrawing = false; let currentDrawColor = '#00d2ff';
        let currentMap = 'nizina.png'; let currentMapType = 'nizina'; let isPresetMode = false;
        let scale = 1; let panX = 0; let panY = 0; let isPanning = false; let startPanX = 0; let startPanY = 0;
        let activeZonePoints = []; let sceneStates = {}; let historyStack = []; const maxHistoryDepth = 30;

        mapBg.style.backgroundImage = `url('${currentMap}')`;

        // Умный снимок истории для поддержки отката разметки двух холстов через Ctrl + Z
        function pushToHistory() {
            if (isPresetMode) return;
            const currentImg = mapBg.style.backgroundImage.replace(/^url\(['"](.+)['"]\)$/, '$1'); if (!currentImg) return;
            const tokens = [];
            document.querySelectorAll('.token').forEach(el => {
                tokens.push({ type: el.dataset.type, cls: el.dataset.cls, label: el.dataset.label, x: parseInt(el.style.left) || 0, y: parseInt(el.style.top) || 0 });
            });
            const currentGeom = sceneStates[currentImg] || { zones: [] };
            historyStack.push({
                map: currentImg,
                canvasData: canvas.toDataURL(),
                tokens: tokens,
                zones: JSON.parse(JSON.stringify(currentGeom.zones || []))
            });
            if (historyStack.length > maxHistoryDepth) historyStack.shift();
        }

        const squadConfig = [
            { id: 'shytrma', title: 'Штурма (основной)', color: '#ef4444', label: 'ШТУРМА' },
            { id: 'gazeli', title: 'Газели (2-й отряд)', color: '#3b82f6', label: 'ГАЗЕЛИ' },
            { id: 'polyraki', title: 'Полураки (3-й отряд)', color: '#10b981', label: 'ПОЛУРАКИ' },
            { id: 'ralik-t', title: 'Ралик (Спец-отряд)', color: '#f59e0b', label: 'РАЛИК' },
            { id: 'podderzhka', title: 'Поддержка (Хом Локи)', color: '#06b6d4', label: 'ПОДДЕРЖКА' },
            { id: 'zamena', title: 'Мигрант (Резерв)', color: '#9b59b6', label: 'ЗАМЕНА' }
        ];

        const container = document.getElementById('squads-sidebar-container');
        squadConfig.forEach(sq => {
            const block = document.createElement('div'); block.className = 'squad-card-block'; let rowsHtml = '';
            for (let num = 1; num <= 5; num++) {
                const defaultNick = sq.label.toLowerCase().charAt(0).toUpperCase() + sq.label.toLowerCase().slice(1) + ' ' + num;
                rowsHtml += `<div class="player-input-row"><input type="text" placeholder="Боец ${num}" value="${defaultNick}"><button onclick="spawnPlayerToken('${sq.id}', this)">+</button></div>`;
            }
            block.innerHTML = `<div class="squad-card-item" onclick="togglePlayersBlock('players-${sq.id}')"><div class="squad-card-badge" style="background: ${sq.color}; box-shadow: 0 0 6px ${sq.color};"></div><div class="squad-card-info"><div class="squad-card-title">${sq.title}</div><div class="squad-card-sub">Настройка состава (5 чел)</div></div></div><div id="players-${sq.id}" class="squad-players-inputs"><button style="background: #1e2433; text-align: center; grid-column: span 2; padding: 4px; font-size: 10px;" onclick="spawnSquadToken('${sq.id}', '${sq.label}')">🌟 Метка отряда</button>${rowsHtml}</div>`; container.appendChild(block);
        });
        window.togglePlayersBlock = function (id) { const el = document.getElementById(id); if (el) el.classList.toggle('open'); };
        function saveCurrentSceneState() {
            if (isPresetMode) return;
            const currentImg = mapBg.style.backgroundImage.replace(/^url\(['"](.+)['"]\)$/, '$1'); if (!currentImg) return;
            const tokens = [];
            document.querySelectorAll('.token').forEach(el => {
                tokens.push({ type: el.dataset.type, cls: el.dataset.cls, label: el.dataset.label, x: parseInt(el.style.left) || 0, y: parseInt(el.style.top) || 0 });
            });
            const existingGeom = sceneStates[currentImg] || { zones: [] };
            sceneStates[currentImg] = { canvasData: canvas.toDataURL(), tokens: tokens, zones: existingGeom.zones || [] };
        }

        function loadSceneState(targetImg) {
            document.querySelectorAll('.token').forEach(el => el.remove()); activeZonePoints = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
            if (isPresetMode) { setMode('pan'); return; }

            const state = sceneStates[targetImg];
            if (state) {
                if (state.canvasData) {
                    const img = new Image(); img.src = state.canvasData;
                    img.onload = () => { ctx.drawImage(img, 0, 0); };
                }
                if (state.tokens) state.tokens.forEach(t => { createTokenDOM(t); });
            }
            redrawGeometry();
        }

        window.selectPresetTactics = function (element) {
            saveCurrentSceneState(); presetButtons.forEach(btn => btn.classList.remove('active')); mapButtons.forEach(b => b.classList.remove('active')); element.classList.add('active');
            const presetImg = element.getAttribute('data-preset-img'); currentMapType = element.getAttribute('data-map-type'); isPresetMode = true; if (presetImg) { mapBg.style.backgroundImage = `url('${presetImg}')`; loadSceneState(presetImg); }
        };

        mapButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                saveCurrentSceneState(); presetButtons.forEach(p => p.classList.remove('active')); mapButtons.forEach(b => b.classList.toggle('active', b === btn));
                currentMap = btn.getAttribute('data-img'); currentMapType = btn.getAttribute('data-map-type'); isPresetMode = false; setMode('move'); mapBg.style.backgroundImage = `url('${currentMap}')`; loadSceneState(currentMap);
            });
        });

        // ИСПРАВЛЕНО: Очищает и перерисовывает ТОЛЬКО СВОЙ изолированный верхний холст баз
        function redrawGeometry() {
            gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
            const currentImg = mapBg.style.backgroundImage.replace(/^url\(['"](.+)['"]\)$/, '$1');
            if (!currentImg || !sceneStates[currentImg]) return;
            const state = sceneStates[currentImg];
            if (state.zones) {
                state.zones.forEach(zone => {
                    if (zone.points.length < 2) return;
                    gCtx.beginPath(); gCtx.moveTo(zone.points[0].x, zone.points[0].y);
                    for (let i = 1; i < zone.points.length; i++) gCtx.lineTo(zone.points[i].x, zone.points[i].y);
                    gCtx.closePath(); gCtx.fillStyle = zone.color + '2e'; gCtx.fill(); gCtx.strokeStyle = zone.color; gCtx.lineWidth = 2; gCtx.stroke();
                });
            }
        }

        colorDots.forEach(dot => { dot.addEventListener('click', () => { if (isPresetMode) return; colorDots.forEach(d => d.classList.remove('selected')); dot.classList.add('selected'); currentDrawColor = dot.getAttribute('data-color'); }); });

        // ИСПРАВЛЕНО: Управляет интерактивностью и классами двух раздельных слоев Canvas
        function setMode(mode) {
            activeZonePoints = [];
            if (isPresetMode) {
                currentMode = 'pan'; btnMove.classList.remove('active'); btnPan.classList.add('active'); btnZone.classList.remove('active'); btnErase.classList.remove('active'); if (btnDraw) btnDraw.classList.remove('active');
                canvas.className = ''; gCanvas.className = ''; return;
            }
            currentMode = mode; btnMove.classList.toggle('active', mode === 'move'); btnPan.classList.toggle('active', mode === 'pan'); btnZone.classList.toggle('active', mode === 'zone'); btnErase.classList.toggle('active', mode === 'erase'); if (btnDraw) btnDraw.classList.toggle('active', mode === 'draw');

            // Распределяем pointer-events по слоям
            canvas.className = (mode === 'draw' || mode === 'erase') ? 'canvas-active paintable' : '';
            gCanvas.className = (mode === 'zone') ? 'canvas-active' : '';

            document.querySelectorAll('.token').forEach(token => { token.style.pointerEvents = (mode === 'move') ? 'auto' : 'none'; });
            redrawGeometry();
        }

        if (btnDraw) btnDraw.addEventListener('click', () => setMode('draw'));
        btnMove.addEventListener('click', () => setMode('move')); btnPan.addEventListener('click', () => setMode('pan')); btnZone.addEventListener('click', () => setMode('zone')); btnErase.addEventListener('click', () => setMode('erase'));

        btnClear.addEventListener('click', () => {
            if (isPresetMode) return; pushToHistory();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
            const currentImg = mapBg.style.backgroundImage.replace(/^url\(['"](.+)['"]\)$/, '$1');
            if (currentImg && sceneStates[currentImg]) { sceneStates[currentImg].zones = []; sceneStates[currentImg].canvasData = null; }
            activeZonePoints = []; redrawGeometry(); saveCurrentSceneState();
        });

        btnReset.addEventListener('click', () => { if (isPresetMode) return; pushToHistory(); document.querySelectorAll('.token').forEach(el => el.remove()); scale = 1; panX = 0; panY = 0; updateTransform(); saveCurrentSceneState(); });
        function updateTransform() { zoomWrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`; }
        mapContainer.addEventListener('wheel', (e) => { e.preventDefault(); if (e.deltaY < 0) scale = Math.min(scale + 0.1, 5); else scale = Math.max(scale - 0.1, 0.5); updateTransform(); });
        mapContainer.addEventListener('mousedown', (e) => { if (currentMode !== 'pan' && !isPresetMode) return; isPanning = true; startPanX = e.clientX - panX; startPanY = e.clientY - panY; e.preventDefault(); });
        document.addEventListener('mousemove', (e) => { if (isPanning && (currentMode === 'pan' || isPresetMode)) { panX = e.clientX - startPanX; panY = e.clientY - startPanY; updateTransform(); } });
        document.addEventListener('mouseup', () => { if (isPanning) isPanning = false; });

        // Временный каркас забора КВ рисуется строго на верхнем слое геометрии gCtx
        function drawCurrentZoneWireframe() {
            redrawGeometry(); if (activeZonePoints.length === 0) return;
            gCtx.strokeStyle = currentDrawColor; gCtx.lineWidth = 1.5; gCtx.beginPath(); gCtx.moveTo(activeZonePoints[0].x, activeZonePoints[0].y);
            for (let i = 1; i < activeZonePoints.length; i++) gCtx.lineTo(activeZonePoints[i].x, activeZonePoints[i].y);
            gCtx.stroke();
            activeZonePoints.forEach(pt => { gCtx.fillStyle = '#ffffff'; gCtx.beginPath(); gCtx.arc(pt.x, pt.y, 2.5, 0, Math.PI * 2); gCtx.fill(); });
        }

        function isPointInPolygon(x, y, points) {
            let inside = false;
            for (let i = 0, j = points.length - 1; i < points.length; j = i++) {
                const xi = points[i].x, yi = points[i].y; const xj = points[j].x, yj = points[j].y;
                const intersect = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi); if (intersect) inside = !inside;
            }
            return inside;
        }
        // ИСПРАВЛЕНО: Обработчик клика распределяет ЛКМ/ПКМ по независимым слоям
        function handleCanvasMouseDown(e) {
            if (isPresetMode) return;
            const img = mapBg.style.backgroundImage.replace(/^url\(['"](.+)['"]\)$/, '$1'); if (!img) return;
            if (!sceneStates[img]) sceneStates[img] = { tokens: [], zones: [] };

            // Считаем координаты клика относительно контейнера карты (чтобы работало на обоих слоях одинаково)
            const rect = mapBg.getBoundingClientRect();
            const x = (e.clientX - rect.left) / scale;
            const y = (e.clientY - rect.top) / scale;

            if (e.button === 0) {
                if (currentMode === 'draw') {
                    pushToHistory(); isDrawing = true; ctx.beginPath(); ctx.moveTo(x, y);
                    ctx.strokeStyle = currentDrawColor; ctx.lineWidth = 4 / scale; ctx.lineCap = 'round'; return;
                }
                if (currentMode === 'erase') {
                    pushToHistory(); isDrawing = true; ctx.beginPath(); ctx.moveTo(x, y);
                    ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 30 / scale; ctx.lineCap = 'round'; return;
                }
                if (currentMode === 'zone') {
                    if (activeZonePoints.length > 2 && Math.hypot(x - activeZonePoints[0].x, y - activeZonePoints[0].y) < 12) {
                        pushToHistory(); sceneStates[img].zones.push({ points: activeZonePoints, color: currentDrawColor }); activeZonePoints = [];
                        redrawGeometry(); saveCurrentSceneState();
                    } else {
                        activeZonePoints.push({ x: x, y: y }); drawCurrentZoneWireframe();
                    }
                }
            }

            if (e.button === 2) {
                e.preventDefault();
                if (currentMode === 'zone') { activeZonePoints = []; redrawGeometry(); return; }
                if (currentMode === 'erase' || currentMode === 'move') {
                    pushToHistory();
                    sceneStates[img].zones = sceneStates[img].zones.filter(zone => !isPointInPolygon(x, y, zone.points));
                    redrawGeometry(); saveCurrentSceneState();
                }
            }
        }

        function handleCanvasMouseMove(e) {
            if (!isDrawing) return;
            const rect = mapBg.getBoundingClientRect();
            const x = (e.clientX - rect.left) / scale;
            const y = (e.clientY - rect.top) / scale;
            if (currentMode === 'draw' || currentMode === 'erase') { ctx.lineTo(x, y); ctx.stroke(); }
        }

        // Подключаем слушатели на глобальный контейнер фона, чтобы клики прошивали слои насквозь
        mapBg.addEventListener('mousedown', handleCanvasMouseDown);
        mapBg.addEventListener('mousemove', handleCanvasMouseMove);

        window.addEventListener('mouseup', () => {
            if (isDrawing) { isDrawing = false; ctx.globalCompositeOperation = 'source-over'; saveCurrentSceneState(); }
        });

        mapBg.addEventListener('contextmenu', e => e.preventDefault());
        let activeToken = null; let startX = 0, startY = 0; let tokenLeft = 0, tokenTop = 0;

        function initDragForToken(token) {
            token.addEventListener('mousedown', (e) => {
                if (isPresetMode) return; if (currentMode !== 'move' || e.button !== 0) return;
                pushToHistory(); activeToken = token; startX = e.clientX; startY = e.clientY;
                tokenLeft = parseInt(token.style.left) || 0; tokenTop = parseInt(token.style.top) || 0; token.style.zIndex = 1000; e.stopPropagation();
            });
        }

        document.addEventListener('mousemove', (e) => {
            if (!activeToken || isPresetMode) return;
            const dx = (e.clientX - startX) / scale; const dy = (e.clientY - startY) / scale;
            let newX = tokenLeft + dx; let newY = tokenTop + dy;
            newX = Math.max(0, Math.min(newX, 618 - activeToken.offsetWidth)); newY = Math.max(0, Math.min(newY, 447 - activeToken.offsetHeight));
            activeToken.style.left = newX + 'px'; activeToken.style.top = newY + 'px';
        });
        document.addEventListener('mouseup', () => { if (activeToken) { activeToken.style.zIndex = '50'; activeToken = null; saveCurrentSceneState(); } });

        function createTokenDOM(t) {
            const div = document.createElement('div'); div.dataset.type = t.type; div.dataset.cls = t.cls; div.dataset.label = t.label;
            div.className = (t.type === 'obj') ? `token obj-token ${t.cls}` : `token ${t.cls}`;
            div.innerHTML = `<div class="token-dot-visual"></div><span>${t.label}</span>`;
            div.style.pointerEvents = (currentMode === 'move') ? 'auto' : 'none';
            div.oncontextmenu = (e) => { if (isPresetMode) return; e.preventDefault(); pushToHistory(); div.remove(); saveCurrentSceneState(); };
            div.style.left = t.x + 'px'; div.style.top = t.y + 'px'; mapBg.appendChild(div); initDragForToken(div);
        }

        window.spawnSquadToken = function (cls, label) {
            if (isPresetMode) return;
            const existingTeamToken = Array.from(document.querySelectorAll(`.token.${cls}`)).find(el => el.dataset.type === 'team');
            if (existingTeamToken) return;
            pushToHistory(); createTokenDOM({ type: 'team', cls: cls, label: label, x: 295, y: 210 }); saveCurrentSceneState();
        };

        window.spawnPlayerToken = function (cls, btnElement) { if (isPresetMode) return; const input = btnElement.previousElementSibling; if (!input || !input.value.trim()) return; pushToHistory(); const playerNick = input.value.trim(); createTokenDOM({ type: 'player', cls: cls, label: playerNick, x: 295, y: 210 }); saveCurrentSceneState(); };
        window.spawnObject = function (type) {
            if (isPresetMode) return; pushToHistory(); let config = {};
            if (type === 'barricade') config = { type: 'obj', cls: 'obj-barricade', label: '', x: 297, y: 211 }; if (type === 'tent') config = { type: 'obj', cls: 'obj-tent', label: '', x: 297, y: 211 }; if (type === 'ralik') config = { type: 'obj', cls: 'obj-ralik', label: '', x: 297, y: 211 };
            createTokenDOM(config); saveCurrentSceneState();
        };

        function undoLastAction() {
            if (isPresetMode || historyStack.length === 0) return; const previousState = historyStack.pop();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
            sceneStates[previousState.map] = { zones: previousState.zones || [], canvasData: previousState.canvasData };
            document.querySelectorAll('.token').forEach(el => el.remove());

            if (previousState.canvasData) {
                const img = new Image(); img.src = previousState.canvasData;
                img.onload = () => { ctx.drawImage(img, 0, 0); };
            }
            if (previousState.tokens) previousState.tokens.forEach(t => createTokenDOM(t));
            redrawGeometry();
        }

        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if ((e.ctrlKey || e.metaKey) && e.code === 'KeyZ') { e.preventDefault(); undoLastAction(); return; }
            if (e.key === '1') setMode('move'); if (e.key === '2') setMode('pan'); if (e.key === '3') setMode('zone'); if (e.key === '4') setMode('erase'); if (e.key === '5') setMode('draw');
        });

        loadSceneState(currentMap);
    </script>
</body>
</html>
